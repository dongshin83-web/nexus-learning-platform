openapi: 3.0.3
info:
  title: Team Technical Assets Internal API
  version: 0.1.0
  description: 백엔드 제품과 무관하게 유지하는 사내 Library 및 Culture 기록 API 계약
servers:
  - url: /api/v1
paths:
  /assets:
    get:
      summary: Library 자산 검색
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: publicationStatus
          schema: { type: string }
      responses:
        '200':
          description: 검색 결과
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Asset' }
    post:
      summary: 자산 초안 생성
      security: [{ sessionAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Asset' }
      responses:
        '201':
          description: 생성 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Asset' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /assets/{assetId}:
    parameters:
      - $ref: '#/components/parameters/AssetId'
    get:
      summary: 자산 상세 조회
      responses:
        '200':
          description: 자산 상세
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Asset' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: 자산 초안 수정
      security: [{ sessionAuth: [] }]
      parameters:
        - in: header
          name: If-Match
          required: true
          description: 충돌 방지를 위한 현재 version
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200':
          description: 수정 완료
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Asset' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /assets/{assetId}/recommendations:
    parameters:
      - $ref: '#/components/parameters/AssetId'
    get:
      summary: Library 및 Framework 연결 후보 추천·검색
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: target
          schema:
            type: string
            enum: [library, technology-map, learning-path]
      responses:
        '200':
          description: 추천과 검색 결과
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecommendationResult' }
  /assets/{assetId}/submit:
    parameters:
      - $ref: '#/components/parameters/AssetId'
    post:
      summary: 검토 요청
      security: [{ sessionAuth: [] }]
      responses:
        '200': { description: 검토 요청 완료 }
        '422': { $ref: '#/components/responses/ValidationError' }
  /assets/{assetId}/request-changes:
    parameters:
      - $ref: '#/components/parameters/AssetId'
    post:
      summary: Reviewer 수정 요청
      security: [{ sessionAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment: { type: string }
      responses:
        '200': { description: 수정 요청 완료 }
  /assets/{assetId}/publish:
    parameters:
      - $ref: '#/components/parameters/AssetId'
    post:
      summary: Reviewer 승인 및 게시
      security: [{ sessionAuth: [] }]
      responses:
        '200': { description: 게시 완료 }
        '403': { description: Reviewer 권한 필요 }
        '422': { $ref: '#/components/responses/ValidationError' }
  /culture-records:
    get:
      summary: Culture & History 기록 조회
      responses:
        '200':
          description: 기록 목록
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CultureRecord' }
    post:
      summary: Culture & History 기록 생성
      security: [{ sessionAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CultureRecord' }
      responses:
        '201': { description: 생성 완료 }
        '422': { $ref: '#/components/responses/ValidationError' }
  /culture-records/{recordId}:
    parameters:
      - in: path
        name: recordId
        required: true
        schema: { type: string }
    patch:
      summary: Culture & History 기록과 이미지·링크 수정
      security: [{ sessionAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200': { description: 수정 완료 }
        '422': { $ref: '#/components/responses/ValidationError' }
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: internal_session
  parameters:
    AssetId:
      in: path
      name: assetId
      required: true
      schema: { type: string }
  schemas:
    Asset:
      type: object
      required: [id, registrationId, type, title, domain, publicationStatus, owner, summary, content]
      additionalProperties: true
      properties:
        id: { type: string, pattern: '^[a-z0-9][a-z0-9-]*$' }
        registrationId: { type: string }
        type: { type: string }
        title: { type: string }
        domain: { type: string }
        publicationStatus: { type: string }
        workflowStatus:
          type: string
          enum: [초안, 검토 요청, 수정 필요, 승인, 게시, 보관]
        owner: { type: string }
        reviewer: { type: string }
        version: { type: integer, minimum: 1 }
        summary: { type: string }
        links:
          type: array
          items: { type: object, additionalProperties: true }
        relations:
          type: array
          items: { type: object, additionalProperties: true }
        frameworkLinks:
          type: array
          items: { type: object, additionalProperties: true }
        content: { type: object, additionalProperties: true }
    CultureRecord:
      type: object
      required: [id, type, title, summary]
      additionalProperties: false
      properties:
        id: { type: string, pattern: '^[a-z0-9][a-z0-9-]*$' }
        type: { type: string, enum: [팀장레터, 워크샵 결과, 운영 원칙, 회고] }
        title: { type: string }
        series: { type: string }
        status: { type: string }
        date: { type: string }
        summary: { type: string }
        tags:
          type: array
          items: { type: string }
        images:
          type: array
          items:
            type: object
            required: [src, alt]
            properties:
              src: { type: string }
              alt: { type: string }
        links:
          type: array
          items:
            type: object
            required: [label, href, kind]
            properties:
              label: { type: string }
              href: { type: string }
              kind: { type: string }
    RecommendationResult:
      type: object
      required: [recommended, searchResults, selected]
      properties:
        recommended: { type: array, items: { type: object, additionalProperties: true } }
        searchResults: { type: array, items: { type: object, additionalProperties: true } }
        selected: { type: array, items: { type: object, additionalProperties: true } }
  responses:
    NotFound:
      description: 대상을 찾을 수 없음
    Conflict:
      description: 중복 ID 또는 version 충돌
    ValidationError:
      description: 등록 계약 검증 실패
      content:
        application/json:
          schema:
            type: object
            required: [message, errors]
            properties:
              message: { type: string }
              errors:
                type: array
                items: { type: string }
